name: Bootstrap repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-repository
  cancel-in-progress: false

jobs:
  expand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Assemble verified payload
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunks/part-* > /tmp/codespace-release.b64
          echo "payload_base64_bytes=$(wc -c < /tmp/codespace-release.b64)"
          base64 --decode /tmp/codespace-release.b64 > /tmp/codespace-release.tar.gz
          actual="$(sha256sum /tmp/codespace-release.tar.gz | cut -d' ' -f1)"
          echo "payload_sha256=${actual}"
          test "${actual}" = "b6257b456bcbb9d5e2751400af7dac5f4ade3d09ab6e74fa8e2c016dcb5862a5"

      - name: Validate archive inventory
        shell: bash
        run: |
          set -euo pipefail
          files="$(tar -tzf /tmp/codespace-release.tar.gz | grep -v '/$' | wc -l)"
          echo "archive_files=${files}"
          test "${files}" -eq 66
          tar -tzf /tmp/codespace-release.tar.gz | grep -Fx 'Cargo.toml'
          tar -tzf /tmp/codespace-release.tar.gz | grep -Fx 'site/index.html'
          tar -tzf /tmp/codespace-release.tar.gz | grep -Fx '.github/workflows/ci.yml'

      - name: Expand final release tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/codespace-release
          mkdir -p /tmp/codespace-release
          tar -xzf /tmp/codespace-release.tar.gz -C /tmp/codespace-release
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/codespace-release/. .
          test -f Cargo.toml
          test -f site/index.html
          test -f .github/workflows/ci.yml

      - name: Commit exact release tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          test -n "$(git diff --cached --name-only)"
          git commit -m "Release CodeSpace 1.0.0 with cse CLI and Pages"

      - name: Push final main
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Create and push v1.0.0 tag
        shell: bash
        run: |
          set -euo pipefail
          git tag -a v1.0.0 -m "CodeSpace 1.0.0"
          git push origin refs/tags/v1.0.0
