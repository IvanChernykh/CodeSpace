name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions: {}

jobs:
  prepare:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            version="$(awk -F '"' '/^version = / {print $2; exit}' Cargo.toml)"
            tag="v${version}"
          fi
          version="${tag#v}"
          git fetch --tags --force
          git rev-parse --verify "refs/tags/${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy
      - name: Release gates
        run: |
          cargo +1.97.1 fmt --all -- --check
          cargo +1.97.1 check --all-targets --locked
          cargo +1.97.1 clippy --all-targets --locked -- -D clippy::correctness
          cargo +1.97.1 test --all-targets --locked
          python3 scripts/validate_site.py
          python3 scripts/self_test.py
          cargo +1.97.1 package --allow-dirty --locked

  build:
    needs: [prepare, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Install Rust target
        run: |
          rustup toolchain install 1.97.1 --profile minimal
          rustup +1.97.1 target add ${{ matrix.target }}
      - name: Build release binary
        run: cargo +1.97.1 build --release --locked --target ${{ matrix.target }}
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          name="codespace-cse-${{ needs.prepare.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/cse" "dist/${name}/cse"
          cp README.md LICENSE NOTICE SECURITY.md CHANGELOG.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "codespace-cse-${{ needs.prepare.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cse.exe" "dist/$name/cse.exe"
          Copy-Item README.md,LICENSE,NOTICE,SECURITY.md,CHANGELOG.md "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          source_name="codespace-cse-${{ needs.prepare.outputs.version }}-source"
          git archive --format=tar.gz --prefix="${source_name}/" --output="dist/${source_name}.tar.gz" "${{ needs.prepare.outputs.tag }}"
          sha256sum "dist/${source_name}.tar.gz" > "dist/${source_name}.tar.gz.sha256"
      - name: Publish or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --title "CodeSpace $RELEASE_TAG" --notes-file CHANGELOG.md
          fi
